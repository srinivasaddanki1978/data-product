version: 2

models:
  - name: int__alert_cost_daily_spike
    description: Detects when daily cost exceeds 2x the 30-day rolling average.
    columns:
      - name: alert_id
        tests: [not_null]

  - name: int__alert_warehouse_idle
    description: Detects warehouses idle for more than the configured threshold.
    columns:
      - name: alert_id
        tests: [not_null]

  - name: int__alert_credit_budget
    description: Detects when MTD credits exceed budget thresholds (80%/100%).
    columns:
      - name: alert_id
        tests: [not_null]

  - name: int__alert_query_spill
    description: Detects queries spilling over threshold bytes to remote storage.
    columns:
      - name: alert_id
        tests: [not_null]

  - name: int__alert_storage_growth
    description: Detects databases with storage growth exceeding threshold WoW.
    columns:
      - name: alert_id
        tests: [not_null]

  - name: int__alert_repeated_expensive
    description: Detects repeated expensive queries exceeding daily threshold.
    columns:
      - name: alert_id
        tests: [not_null]

  - name: int__alert_union_all
    description: Union of all alert detection models in standardized schema.
    columns:
      - name: alert_id
        tests: [not_null]
      - name: detected_at
        tests: [not_null]

  - name: int__alert_state_tracker
    description: >
      Incremental alert state tracker with episode-based deduplication.
      Assigns episode numbers and tracks new vs continuation alerts.
    columns:
      - name: alert_episode_key
        tests: [unique, not_null]
      - name: alert_id
        tests: [not_null]

  - name: pub__teams_alert_payload
    description: >
      Teams Adaptive Card payloads for new alert episodes.
      Only generates for alerts with teams_enabled=TRUE.
    columns:
      - name: alert_episode_key
        tests: [unique, not_null]

  - name: pub__alert_history
    description: Full audit trail of all fired alerts with send status.
    columns:
      - name: alert_episode_key
        tests: [unique, not_null]
