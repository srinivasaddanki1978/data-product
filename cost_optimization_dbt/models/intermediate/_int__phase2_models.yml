version: 2

models:
  # ── Warehouse Right-Sizing (Week 5) ───────────────────────────────
  - name: int__warehouse_sizing_analysis
    description: Per-warehouse sizing metrics with execution time percentiles and spill frequency.
    columns:
      - name: warehouse_name
        tests: [unique, not_null]

  - name: int__warehouse_queue_analysis
    description: Hourly queue frequency analysis per warehouse.
    columns:
      - name: warehouse_name
        tests: [not_null]

  - name: int__warehouse_auto_suspend_analysis
    description: Optimal auto-suspend setting analysis per warehouse.
    columns:
      - name: warehouse_name
        tests: [unique, not_null]
      - name: potential_savings_usd
        tests: [{assert_positive_value: {}}]

  - name: int__warehouse_schedule_analysis
    description: Query volume by hour/day with off-peak savings potential.
    columns:
      - name: warehouse_name
        tests: [not_null]

  # ── Anti-Pattern Detection (Week 6) ────────────────────────────────
  - name: int__antipattern_full_table_scan
    description: Queries scanning >80% of partitions on tables with >100 partitions.
    columns:
      - name: query_id
        tests: [not_null]

  - name: int__antipattern_select_star
    description: Queries using SELECT * pattern.
    columns:
      - name: query_id
        tests: [not_null]

  - name: int__antipattern_spill_to_storage
    description: Queries spilling to local or remote storage.
    columns:
      - name: query_id
        tests: [not_null]

  - name: int__antipattern_repeated_queries
    description: Same query hash running >10 times/day with significant cost.
    columns:
      - name: query_id
        tests: [not_null]

  - name: int__antipattern_cartesian_join
    description: Queries producing disproportionately more rows than scanned (cartesian join indicator).
    columns:
      - name: query_id
        tests: [not_null]

  - name: int__antipattern_large_sort_no_limit
    description: Queries with ORDER BY on >100K rows without LIMIT clause.
    columns:
      - name: query_id
        tests: [not_null]

  - name: int__antipattern_union_all
    description: Union of all anti-pattern detection models in standardized schema.
    columns:
      - name: antipattern_type
        tests: [not_null]

  # ── Storage Optimization (Week 7) ──────────────────────────────────
  - name: int__storage_unused_tables
    description: Tables with 0 reads in 90+ days.
    columns:
      - name: table_name
        tests: [not_null]
      - name: savings_if_dropped_usd
        tests: [{assert_positive_value: {}}]

  - name: int__storage_time_travel_waste
    description: Tables where time travel storage exceeds active storage.
    columns:
      - name: table_name
        tests: [not_null]
      - name: estimated_savings_usd
        tests: [{assert_positive_value: {}}]

  - name: int__storage_transient_candidates
    description: Non-transient tables matching staging/temp patterns.
    columns:
      - name: table_name
        tests: [not_null]

  - name: int__storage_clone_overhead
    description: Tables with clone-retained storage overhead.
    columns:
      - name: table_name
        tests: [not_null]

  - name: int__storage_recommendations
    description: Union of all storage optimization findings.
    columns:
      - name: recommendation_type
        tests: [not_null]
