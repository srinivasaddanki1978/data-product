version: 2

models:
  - name: int__warehouse_daily_credits
    description: Daily credit consumption and cost per warehouse.
    columns:
      - name: warehouse_name
        tests: [not_null]
      - name: date
        tests: [not_null]
      - name: estimated_cost_usd
        tests: [{assert_positive_value: {}}]

  - name: int__query_cost_attribution
    description: Per-query cost estimation based on execution time and warehouse size.
    columns:
      - name: query_id
        tests: [unique, not_null]
      - name: estimated_cost_usd
        tests: [{assert_positive_value: {}}]

  - name: int__warehouse_utilisation
    description: 5-minute interval warehouse utilisation metrics.
    columns:
      - name: warehouse_name
        tests: [not_null]
      - name: interval_start
        tests: [not_null]

  - name: int__user_cost_summary
    description: Monthly aggregated cost per user with ranking.
    columns:
      - name: user_name
        tests: [not_null]
      - name: month
        tests: [not_null]
      - name: total_cost_usd
        tests: [{assert_positive_value: {}}]

  - name: int__storage_breakdown
    description: Per-table storage breakdown with last access date.
    columns:
      - name: database_name
        tests: [not_null]
      - name: table_name
        tests: [not_null]

  - name: int__serverless_credits
    description: Unified view of all serverless feature credit usage.
    columns:
      - name: service_type
        tests: [not_null]
      - name: date
        tests: [not_null]
      - name: credits_used
        tests: [{assert_positive_value: {}}]

  - name: int__idle_warehouse_periods
    description: Detected idle warehouse periods with wasted credit estimates.
    columns:
      - name: warehouse_name
        tests: [not_null]
      - name: idle_duration_minutes
        tests: [{assert_positive_value: {}}]

  - name: int__query_patterns
    description: Query execution patterns grouped by parameterized hash.
    columns:
      - name: query_hash
        tests: [not_null]
      - name: query_date
        tests: [not_null]

  - name: int__daily_cost_rollup
    description: Single daily cost table combining compute, storage, and serverless with rolling averages.
    columns:
      - name: date
        tests: [unique, not_null]
      - name: total_cost
        tests: [{assert_positive_value: {}}]

  - name: int__team_cost_attribution
    description: Cost attribution by team with proportional allocation.
    columns:
      - name: team_name
        tests: [not_null]
      - name: month
        tests: [not_null]

  - name: int__cost_forecast
    description: 90-day daily cost forecast using linear regression on last 90 days of actuals.
    columns:
      - name: forecast_date
        tests: [unique, not_null]
      - name: predicted_total_cost
        tests: [not_null]

  - name: int__team_cost_forecast
    description: Per-team monthly cost forecast using linear regression. Requires 2+ months of data.
    columns:
      - name: team_name
        tests: [not_null]
      - name: forecast_month
        tests: [not_null]

  - name: int__cost_seasonality_baseline
    description: Day-of-week and month-end cost baselines with trend adjustment for seasonality-aware anomaly detection.
    columns:
      - name: date
        tests: [unique, not_null]
      - name: adjusted_baseline
        tests: [not_null]
      - name: effective_stddev
        tests: [not_null]

  - name: int__recommendation_lifecycle
    description: Recommendation lifecycle tracking with ROI computation for implemented items.
    columns:
      - name: recommendation_id
        tests: [unique, not_null]
      - name: status
        tests:
          - accepted_values:
              values: ['OPEN', 'ACCEPTED', 'IMPLEMENTED', 'REJECTED', 'DEFERRED']

  - name: int__data_freshness_monitor
    description: Monitors staleness of key ACCOUNT_USAGE source tables.
    columns:
      - name: source_name
        tests: [unique, not_null]
      - name: staleness_minutes
        tests: [not_null]
