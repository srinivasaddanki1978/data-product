version: 2

models:
  - name: pub__warehouse_recommendations
    description: Warehouse-level recommendations with savings estimates and SQL to apply.
    columns:
      - name: warehouse_name
        tests: [not_null]
      - name: estimated_monthly_savings_usd
        tests: [{assert_positive_value: {}}]
      - name: priority_score
        tests: [{assert_positive_value: {}}]

  - name: pub__query_optimization_candidates
    description: Top 100 query optimization opportunities ranked by waste.
    columns:
      - name: optimization_rank
        tests: [unique, not_null]
      - name: estimated_waste_usd
        tests: [{assert_positive_value: {}}]

  - name: pub__antipattern_summary
    description: Aggregate anti-pattern statistics with 30-day trends.
    columns:
      - name: antipattern_type
        tests: [unique, not_null]

  - name: pub__all_recommendations
    description: >
      Master unified recommendations across warehouse, query, and storage categories.
      Ranked by priority_score. This is the 'money page' data source.
    columns:
      - name: recommendation_id
        tests: [unique, not_null]
      - name: overall_rank
        tests: [unique, not_null]
      - name: estimated_monthly_savings_usd
        tests: [{assert_positive_value: {}}]
      - name: category
        tests:
          - accepted_values:
              values: ['WAREHOUSE', 'QUERY', 'STORAGE']
      - name: effort
        tests:
          - accepted_values:
              values: ['LOW', 'MEDIUM', 'HIGH']
      - name: confidence
        tests:
          - accepted_values:
              values: ['LOW', 'MEDIUM', 'HIGH']
